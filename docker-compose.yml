services:
  backend:
    build:
      context: ./backend
    container_name: react-waey-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
       VITE_API_URL: http://localhost:8080/api
       VITE_SOCKET_URL: http://localhost:8080/api
    container_name: react-waey-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
